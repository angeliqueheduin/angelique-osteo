[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    X-XSS-Protection = "0"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://assets.calendly.com https://cdn.jsdelivr.net https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/ https://www.gstatic.com/firebasejs/ https://cdn.emailjs.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://angelique-osteo.fr https://lh3.googleusercontent.com https://maps.gstatic.com https://maps.googleapis.com https://www.gstatic.com/; frame-src https://calendly.com https://www.google.com/recaptcha/ https://recaptcha.google.com/recaptcha/ https://angelique-osteo.firebaseapp.com; connect-src 'self' https://fonts.googleapis.com https://calendly.com https://www.google.com https://www.gstatic.com https://*.firebasedatabase.app https://firebasedatabase.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://api.emailjs.com; worker-src 'none'; upgrade-insecure-requests"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"


[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json; charset=utf-8"

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/formations-details.html"
  to = "/formations-details"
  status = 301
  force = true

[[redirects]]
  from = "/avis.html"
  to = "/avis"
  status = 301
  force = true

[[redirects]]
  from = "/parcours.html"
  to = "/parcours"
  status = 301
  force = true

[[redirects]]
  from = "/tarifs-et-horaires.html"
  to = "/tarifs-et-horaires"
  status = 301
  force = true

[[redirects]]
  from = "/actualites.html"
  to = "/actualites"
  status = 301
  force = true

[[redirects]]
  from = "/mentions-legales.html"
  to = "/mentions-legales"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404